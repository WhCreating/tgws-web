<!-- copy_text.html -->
<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tg-Ws Proxy Web</title>
  <link rel="stylesheet" href="{{ url_for('static', path='/styles.css') }}" />
</head>
<body>
  <div class="container">
    <div class="card">
      <h1>📋 Скопируйте текст</h1>
      <p class="sub">Нажмите на кнопку справа, чтобы скопировать содержимое.</p>

      <!-- Блок с основным URL (оставляем как есть) -->
      <div class="copy-box">
        <span class="text-content" id="textToCopy">{{ url_proxy }}</span>
        <button class="copy-btn" data-target="textToCopy" aria-label="Копировать текст">📄</button>
      </div>

      <!-- ★ Доработанные строки с параметрами: каждая в одной строке -->
      <div class="display-lines">
        <div class="param-line">
          <span class="label">Сервер:</span>
          <span class="value">{{ server }}</span>
          <button class="copy-btn" data-target="value" aria-label="Копировать сервер">📄</button>
        </div>
        <div class="param-line">
          <span class="label">Порт:</span>
          <span class="value">{{ port }}</span>
          <button class="copy-btn" data-target="value" aria-label="Копировать порт">📄</button>
        </div>
        <div class="param-line">
          <span class="label">Секрет:</span>
          <span class="value">{{ secret }}</span>
          <button class="copy-btn" data-target="value" aria-label="Копировать секрет">📄</button>
        </div>
      </div>

      <div class="copy-feedback" id="copyFeedback">✅ Скопировано!</div>

      <div class="mt-2">
        <p style="color: var(--text-secondary); font-size: 0.9rem;">
          <small>nn-team @ <a href="https://github.com/WhCreating/tgws-web">TgWs Web Interface</a></small>
        </p>
      </div>
    </div>
  </div>

  <script>
    (function() {
      const feedback = document.getElementById('copyFeedback');

      // Функция показа уведомления
      function showFeedback(msg) {
        feedback.textContent = msg;
        feedback.classList.add('show');
        setTimeout(() => {
          feedback.classList.remove('show');
        }, 2500);
      }

      // Функция копирования текста
      async function copyText(text) {
        if (!text) return;
        try {
          await navigator.clipboard.writeText(text);
          showFeedback('✅ Скопировано!');
        } catch (err) {
          // fallback
          const textarea = document.createElement('textarea');
          textarea.value = text;
          document.body.appendChild(textarea);
          textarea.select();
          try {
            document.execCommand('copy');
            showFeedback('✅ Скопировано!');
          } catch (e) {
            showFeedback('❌ Не удалось скопировать');
          }
          document.body.removeChild(textarea);
        }
      }

      // Находим все кнопки с классом copy-btn
      document.querySelectorAll('.copy-btn').forEach(btn => {
        btn.addEventListener('click', function(e) {
          e.preventDefault();
          const target = this.getAttribute('data-target');
          let text = '';

          if (target === 'textToCopy') {
            // Копируем текст из элемента с id="textToCopy"
            const el = document.getElementById('textToCopy');
            if (el) text = el.textContent.trim();
          } else if (target === 'value') {
            // Ищем ближайший родительский .param-line, внутри него .value
            const line = this.closest('.param-line');
            if (line) {
              const valueEl = line.querySelector('.value');
              if (valueEl) text = valueEl.textContent.trim();
            }
          }

          if (text) {
            copyText(text);
          } else {
            showFeedback('❌ Нет данных для копирования');
          }
        });
      });

    })();
  </script>
</body>
</html>
