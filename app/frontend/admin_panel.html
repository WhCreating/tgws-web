<!-- reset_page.html -->
<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tg-Ws Proxy Admin</title>
  <link rel="stylesheet" href="{{ url_for('static', path='/styles.css') }}" />
</head>
<body>
  <div class="container">
    <div class="card">
      <h1>🔄 Админ-Панель от Tg-Ws Web</h1>
      <p class="sub">Введите пароль и выберите действие.</p>

      <div class="form-group">
        <label for="inputPassword">Пароль:</label>
        <div style="display: flex; align-items: center; gap: 0.5rem;">
          <!-- ★ Сюда я добавил все стили прямо в тег -->
          <input 
            type="password" 
            id="inputPassword" 
            value="" 
            placeholder="Введите пароль от админ-панели" 
            style="
              flex: 1; 
              padding: 0.8rem 1rem; 
              font-size: 1rem; 
              border: 1px solid #e2e8f0; 
              border-radius: 10px; 
              background: #f8fafc; 
              font-family: inherit; 
              color: #0f172a; 
              transition: border-color 0.2s, box-shadow 0.2s; 
              outline: none;
            "
            onfocus="this.style.borderColor='#4f46e5'; this.style.boxShadow='0 0 0 3px rgba(79,70,229,0.15)';"
            onblur="this.style.borderColor='#e2e8f0'; this.style.boxShadow='none';"
          />
          <button type="button" id="togglePassword" class="btn btn-secondary" style="padding: 0.7rem 1rem; flex-shrink: 0;">
            👁️
          </button>
        </div>
      </div>

      <div class="actions">
        <button class="btn" id="saveBtn" onclick="restart_proxy()">Перезапустить прокси</button>
      </div>

      <div class="mt-2">
        <p style="color: var(--text-secondary); font-size: 0.9rem;">
          <small>nn-team @ <a href="https://github.com/WhCreating/tgws-web">TgWs Web Interface</a></small>
        </p>
      </div>
    </div>
  </div>

  <script>
    (function() {
      const inputField = document.getElementById('inputPassword');
      const saveBtn = document.getElementById('saveBtn');
      const toggleBtn = document.getElementById('togglePassword');


      // Переключение видимости пароля
      toggleBtn.addEventListener('click', function() {
        const isPassword = inputField.getAttribute('type') === 'password';
        inputField.setAttribute('type', isPassword ? 'text' : 'password');
        toggleBtn.textContent = isPassword ? '🙈' : '👁️';
        toggleBtn.setAttribute('aria-label', isPassword ? 'Скрыть пароль' : 'Показать пароль');
      });
    })();

    async function restart_proxy() {
      const inputPassword = document.getElementById("inputPassword");
      var res = await fetch(`/restart-proxy/${inputPassword.value}`, { method: 'POST'});
      
      if (res.ok){
        alert(`${res.status}: Прокси успешно перезапущен`)
      } else {
        alert(`${res.status}: Неправильный пароль`)
      }
    }
  </script>
</body>
</html>
